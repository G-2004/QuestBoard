<head> 
    <link rel="stylesheet" href="assets/css/index.css"> 
    <meta charset="UTF-8"> <title>Quest Board</title> 
    <meta name="description" content="A web application for table top game masters and players for hosting quest boards alongside having the niche feature to route between player location and quest location.">
    <link rel="icon" href="assets/images/favicon.png"> 
</head>
<body>
    <!-- NavBar / Useful buttons -->
    <div class="headerBar">
        <div class="sideNav left">&#9776;</div> <!-- &#9776; is the hamburger menu icon -->
        <a href="index.html"><img class="siteLogo" src="assets/images/logo.png" alt="Map Quest Logo"></a>
        <button id="openQuestForm" class="createQuestBtn right">Create Quest +</button>
    </div>

    <!-- Quest Cards -->
    <div class="mainContent">
        <div class="cardHolder">
            <!-- ** quest cards will fill in using json data translate via javascript ** -->
        </div>
    </div>

    <!-- Form to be displayed upon pressing create quest button -->
    <div id="questFormOverlay" class="overlay hidden">
    <div class="formContainer">
        <h2>Create Quest</h2>

        <input id="questTitle" placeholder="Quest Title">
        <input id="questReward" placeholder="Reward">
        <input id="questDifficulty" type="number" min="1" placeholder="Difficulty (1-10+)">
        
        <img id="thumbnailPreview">
        <input type="file" id="questThumbnail" accept="image/*">

        <div class="formButtons">
            <button id="closeForm">Cancel</button>
            <button id="addQuest">Add+</button>
            <label class="switch"><!--THIS IS CURRENTLY NON-FUNCTIONAL LOOKS NICE. DOESN'T CHANGE ANYTHING-->
                <input type="checkbox" id="pixelToggle">
                <span class="slider"></span>
            </label>
            <span>Pixel Art?</span>
        </div>
    </div>

</div>

    <script src="assets/javascript/cardInserter.js"></script> <!-- Javascript that inserts quest cards into cardHolder -->
</body>
