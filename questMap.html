<!DOCTYPE html>

<head> 
    <link rel="stylesheet" href="assets/css/questMap.css">
    <link rel="stylesheet" href="assets/css/defaultNav.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> <!-- A library I use in coding for foundry vtt with nice in text icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- Bootstrap -->
    <meta charset="UTF-8"> <title>Adventure Atlas - Map</title> 
    <meta name="description" content="A web application for table top game masters and players for hosting quest boards alongside having the niche feature to route between player location and quest location.">
    <link rel="icon" href="assets/images/favicon.png"> 
</head>

<body>
    <!-- NavBar / Useful buttons -->
    <div class="headerBar">
        <div class="sideNav left">&#9776;</div> <!-- &#9776; is the hamburger menu icon -->
        <a href="index.html"><img class="siteLogo" src="assets/images/logo.png" alt="Map Quest Logo"></a>
        <div id="exitPathMode" class="exitButton">X</div>
    </div>

    <div id="mapContainer">
        <canvas id="map"></canvas>
        <div id="editor" class="editorDisplay hidden"></div>
        <div id="regionsDisplay" class="regionEditorDisplay hidden"></div>

        <div class="sideBarLeft">
        </div>
        <div class="userButtons">
            <!-- Delete Node Button -->
            <button class="userButtonDefault modeButton" id="deleteNode"
            data-bs-toggle="tooltip"
            data-bs-title="Delete a node or connection"
            >

            <i class="fa-solid fa-trash"></i>
            </button>

            <!-- Upload Background -->
            <input type="file" id="mapUpload" class="hidden">
            <label for="mapUpload" 
            class="userButtonDefault fileButton"
            data-bs-toggle="tooltip"
            data-bs-title="Upload a background image"
            >
                <i class="fa-solid fa-image"></i>
            </label>

            <!-- Navigate Path -->
            <button class="userButtonDefault modeButton" id="runPath"
            data-bs-toggle="tooltip"
            data-bs-title="Navigate from one node to another"
            >
            <i class="fa-solid fa-map-location-dot"></i>
            </button>

            <!-- Connect Nodes -->
            <button class="userButtonDefault modeButton" id="addConnect"
            data-bs-toggle="tooltip"
            data-bs-title="Connect two nodes"
            >

            <i class="fa-solid fa-plus"></i>
            <i class="fa-solid fa-share-nodes"></i>
                
            </button>

            <!-- Create Node -->
            <button class="userButtonDefault modeButton" id="addNode"
            data-bs-toggle="tooltip"
            data-bs-title="Add a new navigation node"
            >
            <i class="fa-solid fa-plus"></i>
            </button>

            <!-- Download -->
            <button class="userButtonDefault modeButton" id="download"
            data-bs-toggle="tooltip"
            data-bs-title="Download Project"
            >
            <i class="fa-solid fa-download"></i>
            </button>

            <!-- Upload -->
            <input type="file" id="upload" class="hidden">
            <label for="upload" 
            class="userButtonDefault fileButton"
            data-bs-toggle="tooltip"
            data-bs-title="Upload project"
            >
                <i class="fa-solid fa-upload"></i>
            </label>

                
        </div>

        <div class="sideBarRight">
            <!-- Regions menu -->
            <button class="userButtonDefault modeButton" id="regions"
            data-bs-toggle="tooltip"
            data-bs-title="Define Regions"
            >
            <i class="fa-solid fa-bars"></i>
            </button>
        </div>
            
    </div>

    <script type="module" src="assets/javascript/questMap.js"></script> <!-- Javascript that inserts quest cards into cardHolder -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> <!-- Bootstrap -->
</body>
