<head> 
    <link rel="stylesheet" href="assets/css/questMap.css">
    <link rel="stylesheet" href="assets/css/defaultNav.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> <!-- A library I use in coding for foundry vtt with nice in text icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- Bootstrap -->
    <meta charset="UTF-8"> <title>Adventure Atlas - Map</title> 
    <meta name="description" content="A web application for table top game masters and players for hosting quest boards alongside having the niche feature to route between player location and quest location.">
    <link rel="icon" href="assets/images/favicon.png"> 
</head>

<body>
    <!-- NavBar / Useful buttons -->
    <div class="headerBar">
        <div class="sideNav left">&#9776;</div> <!-- &#9776; is the hamburger menu icon -->
        <a href="index.html"><img class="siteLogo" src="assets/images/logo.png" alt="Map Quest Logo"></a>
        <div id="exitPathMode" class="exitButton">X</div>
    </div>

    <div class="userButtons">
        <button class="userButtonDefault fileButton" id="runPath"
        data-bs-toggle="tooltip"
        data-bs-title="Navigate from one node to another"
        >
        <i class="fa-solid fa-map-location-dot"></i>
        </button>

        <input type="file" id="mapUpload" hidden >
        <label for="mapUpload" 
        class="userButtonDefault fileButton"
        data-bs-toggle="tooltip"
        data-bs-title="Upload a background image"
        >
            <i class="fa-solid fa-image"></i>
        </label>
    </div>
        
    <canvas id="map"></canvas>

    <script src="assets/javascript/questMap.js"></script> <!-- Javascript that inserts quest cards into cardHolder -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> <!-- Bootstrap -->
</body>
