<head> 
    <link rel="stylesheet" href="assets/css/defaultNav.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/questDetails.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> <!-- A library I use in coding for foundry vtt with nice in text icons -->
    <meta charset="UTF-8"> <title>Adventure Atlas</title> 
    <meta name="description" content="A web application for table top game masters and players for hosting quest boards alongside having the niche feature to route between player location and quest location.">
    <link rel="icon" href="assets/images/favicon.png"> 
</head>

<body>

    <div class="headerBar">
        <div class="sideNav left">&#9776;</div> <!-- &#9776; is the hamburger menu icon -->
        <a href="index.html"><img class="siteLogo" src="assets/images/logo.png" alt="Map Quest Logo"></a>
    </div>

    <div class="pageLayout">
        <!-- QUICK OVERVIEW -->
        <div class="overviewContainer">
            <h1 id="title"></h1>
            <!-- add room for thumbnail -->
            <p id="host"></p>
            <!-- add room for host image -->
            <p id="reward"></p>
            <p id="difficulty"></p>
        </div>

        
        <div class="rightColumn">

            <!--IMAGE CAROUSEL-->
            <div id="carouselContainerContainer" class="carousel slide" data-bs-ride="false">

                <!-- INDICATORS  -->
                <div class="carousel-indicators" id="carouselIndicators"></div>

                <!-- SLIDES -->
                <div class="carousel-inner" id="carouselContainer"></div>

                <!-- CONTROLS -->
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselContainerContainer" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>

                <button class="carousel-control-next" type="button" data-bs-target="#carouselContainerContainer" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>

            </div>

            <!-- DESCRIPTION -->
            <p id="description"></p>
        </div>
    </div>

    <script src="assets/javascript/questDetails.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
